<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Logging out — Global Corrosion Test Sites Map</title>

  <style>
    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, sans-serif;
      background: #f8fafc;
      color: #111827;
    }

    body {
      display: grid;
      place-items: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .logout-card {
      width: min(420px, 92vw);
      padding: 28px 30px;
      border-radius: 18px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.10);
      text-align: center;
    }

    .logout-symbol {
      width: 42px;
      height: 42px;
      margin: 0 auto 14px;
      border-radius: 999px;
      border: 1px solid #d1d5db;
      display: grid;
      place-items: center;
    }

    .logout-symbol svg {
      width: 21px;
      height: 21px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      color: #374151;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.25;
    }

    p {
      margin: 10px 0 0;
      color: #64748b;
      font-size: 13px;
      line-height: 1.5;
    }

    .logout-link {
      display: inline-block;
      margin-top: 18px;
      color: #1f6feb;
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
    }

    .logout-link:hover {
      text-decoration: underline;
    }

    iframe {
      width: 1px;
      height: 1px;
      border: 0;
      opacity: 0;
      position: absolute;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <main class="logout-card">
    <div class="logout-symbol" aria-hidden="true">
      <svg viewBox="0 0 24 24">
        <path d="M9 6.5V5.2A2.2 2.2 0 0 1 11.2 3h5.6A2.2 2.2 0 0 1 19 5.2v13.6a2.2 2.2 0 0 1-2.2 2.2h-5.6A2.2 2.2 0 0 1 9 18.8v-1.3"></path>
        <path d="M14 12H4"></path>
        <path d="M7.5 8.5 4 12l3.5 3.5"></path>
      </svg>
    </div>

    <h1>Logging out</h1>
    <p>You are being returned to the public corrosion map.</p>

    <a class="logout-link" href="/">Return to public map now</a>
  </main>

  <iframe src="/cdn-cgi/access/logout" title="Cloudflare Access logout"></iframe>

  <script>
    window.setTimeout(function() {
      window.location.replace("/");
    }, 1800);
  </script>
</body>
</html>
